services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: ConferenceAttendeeDb
    ports:
      - "1400:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - conferenceattendeesapi_default
  
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conference-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5258
      ConnectionStrings__ConferenceAttendeeDatabaseConnection: Server=mysql-db;Port=3306;Database=ConferenceAttendeeDb;User=root;Password=12345678;
    ports:
      - "5258:5258"
    depends_on:
      - mysql-db
    networks:
      - conferenceattendeesapi_default

networks:
  conferenceattendeesapi_default:
    external: true

volumes:
  mysql-data: